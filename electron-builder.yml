# productName MUST stay ASCII: a non-ASCII char (the ï) in the macOS
# bundle/executable/Helper path makes Chromium hard-crash (EXC_BREAKPOINT)
# at startup. The visible brand "Aïobi Browser" is preserved via
# CFBundleDisplayName/CFBundleName below and the in-app UI strings.
appId: com.aiobi.browser
productName: Aiobi Browser
copyright: © Aïobi

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - package.json

# macOS is SIGNED (Developer ID) in CI. Notarization is DECOUPLED: done
# separately with notarytool + stapler (Apple's notary queue can stall for
# hours and would otherwise block/lose the whole build). forceCodeSigning
# stays false: it is global, and Windows/Linux have no cert.
forceCodeSigning: false

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  artifactName: Aiobi-Browser-mac-${arch}.${ext}
  icon: build/icon.icns
  extendInfo:
    # CFBundleName MUST be ASCII (Chromium derives internal paths from it;
    # a ï here = EXC_BREAKPOINT at startup). CFBundleDisplayName carries the
    # real brand with the tréma — that is what Finder/Dock/menu bar show.
    CFBundleName: Aiobi Browser
    CFBundleDisplayName: Aïobi Browser
    NSCameraUsageDescription: Aïobi Browser utilise la caméra pour les appels vidéo.
    NSMicrophoneUsageDescription: Aïobi Browser utilise le microphone pour les appels audio et vidéo.

win:
  target:
    - nsis
    - zip
  artifactName: Aiobi-Browser-windows-${arch}.${ext}
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
    - deb
  artifactName: Aiobi-Browser-linux-${arch}.${ext}
  category: Network
  icon: build/icon.png

publish:
  provider: github
  owner: bowendsom-aiobi
  repo: A-obi-Browser
  releaseType: release
