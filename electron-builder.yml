appId: com.aiobi.browser
productName: Aïobi Browser
copyright: © Aïobi

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - package.json

# Signed + notarized via CI secrets (Developer ID, App Store Connect API key).
forceCodeSigning: true

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  icon: build/icon.icns
  extendInfo:
    NSCameraUsageDescription: Aïobi Browser utilise la caméra pour les appels vidéo.
    NSMicrophoneUsageDescription: Aïobi Browser utilise le microphone pour les appels audio et vidéo.

win:
  target:
    - nsis
    - zip
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
    - deb
  category: Network
  icon: build/icon.png

publish:
  provider: github
  owner: bowendsom-aiobi
  repo: A-obi-Browser
  releaseType: release
