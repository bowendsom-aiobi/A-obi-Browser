<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Aïobi</title>
    <link rel="stylesheet" href="tokens.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: grid;
        grid-template-rows: 1fr auto 1fr;
        justify-items: center;
        padding: 24px;
        overflow: hidden;
        font-family: var(--font-body, "Satoshi", -apple-system, sans-serif);
        background: #efeafe url("assets/home-bg.png") center / cover no-repeat fixed;
      }

      .card {
        grid-row: 2;
        width: min(560px, 92vw);
        background: var(--aio-white, #fff);
        border: 1px solid var(--aio-ink-08, rgba(0, 0, 0, 0.08));
        border-radius: var(--radius-lg, 24px);
        box-shadow: 0 24px 60px rgba(20, 12, 40, 0.18);
        padding: 40px 44px 44px;
        animation: rise 360ms var(--ease-standard, cubic-bezier(0.2, 0.7, 0.2, 1)) both;
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
      }

      .head {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        margin-bottom: 28px;
      }
      .logo {
        height: 38px;
        width: auto;
        display: block;
        flex: none;
      }
      .title {
        font-family: var(--font-display, "Clash Display", sans-serif);
        font-weight: 600;
        font-size: 27px;
        letter-spacing: -0.02em;
        color: var(--aio-black, #000);
        margin: 0;
      }

      form {
        margin: 0;
      }
      input {
        width: 100%;
        height: 56px;
        padding: 0 22px;
        font-family: inherit;
        font-size: 16px;
        color: var(--aio-black, #000);
        background: var(--aio-white, #fff);
        border: 1.5px solid var(--aio-black, #000);
        border-radius: var(--radius-pill, 999px);
        outline: none;
        transition: box-shadow var(--dur-base, 200ms) var(--ease-standard, ease),
          border-color var(--dur-base, 200ms) var(--ease-standard, ease);
      }
      input::placeholder {
        color: var(--aio-ink-30, rgba(0, 0, 0, 0.3));
      }
      input:focus {
        border-color: var(--aio-violet, #7233cd);
        box-shadow: 0 0 0 4px rgba(114, 51, 205, 0.18);
      }

      #searchform {
        position: relative;
      }
      #suggest {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(100% + 10px);
        z-index: 5;
        padding: 8px;
        background: var(--aio-white, #fff);
        border: 1px solid var(--aio-ink-08, rgba(0, 0, 0, 0.08));
        border-radius: var(--radius-lg, 24px);
        box-shadow: 0 18px 44px rgba(20, 12, 40, 0.16);
        max-height: 300px;
        overflow-y: auto;
      }
      #suggest::-webkit-scrollbar {
        width: 0;
      }
      .sg {
        display: flex;
        align-items: center;
        gap: 11px;
        height: 44px;
        padding: 0 16px;
        border-radius: var(--radius-md, 16px);
        cursor: pointer;
        color: var(--aio-ink-70, rgba(0, 0, 0, 0.7));
      }
      .sg:hover,
      .sg.sel {
        background: rgba(114, 51, 205, 0.1);
        color: var(--aio-black, #000);
      }
      .sg .fav {
        width: 18px;
        height: 18px;
        flex: none;
        border-radius: 4px;
      }
      .sg .fav.placeholder {
        opacity: 0.5;
      }
      .sg .ic {
        width: 18px;
        height: 18px;
        flex: none;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.75;
        stroke-linecap: round;
        stroke-linejoin: round;
        color: var(--aio-ink-50, rgba(0, 0, 0, 0.5));
      }
      .sg .label {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 15px;
      }

      #recent {
        grid-row: 3;
        align-self: start;
        margin-top: 18px;
        max-height: 100%;
        overflow-y: auto;
        width: min(560px, 92vw);
        background: var(--aio-white, #fff);
        border: 1px solid var(--aio-ink-08, rgba(0, 0, 0, 0.08));
        border-radius: var(--radius-lg, 24px);
        box-shadow: 0 18px 44px rgba(20, 12, 40, 0.14);
        padding: 16px;
        animation: rise 360ms var(--ease-standard, cubic-bezier(0.2, 0.7, 0.2, 1)) both;
      }
      #recent::-webkit-scrollbar {
        width: 0;
      }
      .recent-h {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--aio-ink-50, rgba(0, 0, 0, 0.5));
        padding: 4px 12px 10px;
      }
      .rc {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: var(--radius-md, 16px);
        cursor: pointer;
        color: var(--aio-ink-70, rgba(0, 0, 0, 0.7));
      }
      .rc:hover {
        background: rgba(114, 51, 205, 0.08);
        color: var(--aio-black, #000);
      }
      .rc .fav {
        width: 20px;
        height: 20px;
        flex: none;
        border-radius: 5px;
      }
      .rc .fav.placeholder {
        opacity: 0.45;
      }
      .rc .body {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .rc .t {
        font-size: 14px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .rc .m {
        font-size: 12px;
        color: var(--aio-ink-50, rgba(0, 0, 0, 0.5));
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .more {
        display: block;
        width: 100%;
        text-align: left;
        padding: 10px 12px 4px;
        border: 0;
        background: transparent;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        color: var(--aio-violet, #7233cd);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="head">
        <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 306 266" aria-hidden="true">
          <path d="M146.013 35.9909C200.728 31.3963 248.761 72.1389 253.154 126.871C257.547 181.603 216.628 229.485 161.88 233.676C107.416 237.846 59.8372 197.185 55.4671 142.738C51.0969 88.2904 91.5817 40.5616 146.013 35.9909ZM167.58 222.978C171.723 222.533 176.622 222.048 180.645 221.097C218.196 211.906 244.771 177.276 245.331 138.785C245.955 95.8488 214.643 56.3205 170.679 53.198C167.077 52.9421 163.292 52.7134 159.693 53.126L159.553 53.1432C119.892 55.9743 90.0679 86.1418 83.736 124.904C78.8682 154.703 89.5482 184.783 112.694 204.374C124.417 214.296 138.61 220.846 153.936 222.51C158.407 223.02 161.726 223.452 166.314 223.089L167.58 222.978Z" />
          <path d="M203.291 116.319C207.602 115.893 214.026 118.015 214.634 122.822C215.93 133.077 215.035 144.179 215.121 154.554C215.156 158.895 211.625 162.183 207.655 163.239C193.065 165.079 195.377 149.52 195.472 139.918C195.556 131.518 192.866 119.386 203.291 116.319Z" />
          <path d="M131.312 116.318C149.37 114.65 141.428 140.127 143.196 151.171C144.061 156.577 141.172 161.792 135.376 163.306C128 163.953 123.556 160.012 123.457 152.477C123.341 143.642 123.238 134.717 123.572 125.89C123.749 121.21 126.805 117.516 131.312 116.318Z" />
        </svg>
        <h1 class="title">Aïobi Browser</h1>
      </div>
      <form id="searchform">
        <input
          id="q"
          type="text"
          spellcheck="false"
          autocomplete="off"
          autofocus
          data-i18n-ph="home_ph"
          placeholder="Rechercher ou saisir une adresse"
        />
        <div id="suggest" hidden></div>
      </form>
    </main>
    <section id="recent" hidden>
      <div class="recent-h" data-i18n="recents">Récents</div>
      <div id="recentlist"></div>
      <button id="more" class="more" data-i18n="more">Voir plus</button>
    </section>
    <template id="tpl-search"><svg viewBox="0 0 24 24" class="ic"><circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" /></svg></template>
    <script src="home.js"></script>
  </body>
</html>
