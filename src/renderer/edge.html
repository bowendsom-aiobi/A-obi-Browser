<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body { height: 100%; margin: 0; background: transparent; }
      body {
        display: flex;
        align-items: center;
        cursor: default;
      }
      #chev {
        margin-left: 5px;
        width: 26px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(0, 0, 0, 0.06);
        background: rgba(255, 255, 255, 0.62);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        color: rgba(0, 0, 0, 0.55);
        border-radius: 8px;
        box-shadow: 0 4px 14px rgba(20, 12, 40, 0.12);
        cursor: pointer;
        opacity: 0;
        transform: translateX(-12px);
        transition: opacity 170ms cubic-bezier(0.2, 0.7, 0.2, 1),
          transform 170ms cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      body.show #chev {
        opacity: 1;
        transform: translateX(0);
      }
      #chev:hover {
        color: #7233cd;
        background: rgba(255, 255, 255, 0.85);
      }
      svg {
        width: 15px;
        height: 15px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </head>
  <body>
    <button id="chev" title="Afficher la barre latérale">
      <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6" /></svg>
    </button>
    <script src="edge.js"></script>
  </body>
</html>
