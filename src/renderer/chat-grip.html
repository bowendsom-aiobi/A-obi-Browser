<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        cursor: col-resize;
        background: transparent;
        user-select: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #bar {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #grip {
        width: 3px;
        height: 42px;
        border-radius: 3px;
        background: rgba(0, 0, 0, 0.18);
        transition: background 150ms ease;
      }
      #bar:hover #grip {
        background: #7233cd;
      }
    </style>
  </head>
  <body>
    <div id="bar"><div id="grip"></div></div>
    <script src="chat-grip.js"></script>
  </body>
</html>
