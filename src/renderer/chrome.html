<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Aïobi Browser</title>
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="chrome.css" />
  </head>
  <body>
    <div id="app">
      <div class="dragstrip"></div>

      <header id="brand">
        <img class="brand-mark" src="assets/aiobi-icon.svg" alt="" />
        <span class="brand-word">Aïobi</span>
      </header>

      <nav id="navrow">
        <button id="back" class="iconbtn" data-i18n-title="back" title="Précédent" disabled>
          <svg viewBox="0 0 24 24" class="ic"><path d="m12 19-7-7 7-7" /><path d="M19 12H5" /></svg>
        </button>
        <button id="forward" class="iconbtn" data-i18n-title="forward" title="Suivant" disabled>
          <svg viewBox="0 0 24 24" class="ic"><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></svg>
        </button>
        <button id="reload" class="iconbtn" data-i18n-title="reload" title="Recharger">
          <svg viewBox="0 0 24 24" class="ic ic-reload">
            <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" />
          </svg>
          <svg viewBox="0 0 24 24" class="ic ic-stop"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
        </button>
        <button id="collapse" class="iconbtn" data-i18n-title="collapse" title="Masquer la barre latérale (⌘B)">
          <svg viewBox="0 0 24 24" class="ic"><path d="m11 17-5-5 5-5" /><path d="m18 17-5-5 5-5" /></svg>
        </button>
      </nav>

      <div id="omnibox">
        <svg viewBox="0 0 24 24" class="ic lock">
          <rect width="18" height="11" x="3" y="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        <input id="address" type="text" spellcheck="false" autocomplete="off"
               data-i18n-ph="address_ph" placeholder="Rechercher…" />
        <button id="bookmark" class="starbtn" data-i18n-title="bookmark_add" title="Mettre en favori">
          <svg viewBox="0 0 24 24" class="ic">
            <path d="M11.5 2.3a.53.53 0 0 1 .95 0l2.31 4.68a2.12 2.12 0 0 0 1.6 1.16l5.16.76a.53.53 0 0 1 .3.9l-3.74 3.64a2.12 2.12 0 0 0-.61 1.88l.88 5.14a.53.53 0 0 1-.77.56l-4.62-2.43a2.12 2.12 0 0 0-1.97 0L6.4 21a.53.53 0 0 1-.77-.56l.88-5.14a2.12 2.12 0 0 0-.61-1.88L2.16 9.8a.53.53 0 0 1 .3-.9l5.16-.76a2.12 2.12 0 0 0 1.6-1.16z" />
          </svg>
        </button>
        <div id="progress"></div>
        <div id="suggest" hidden></div>
      </div>

      <div id="tabs"></div>

      <button id="newtab" class="rowbtn">
        <svg viewBox="0 0 24 24" class="ic"><path d="M5 12h14" /><path d="M12 5v14" /></svg>
        <span data-i18n="newtab">Nouvel onglet</span>
      </button>

      <div id="signets" hidden>
        <div class="section-label" data-i18n="signets">Signets</div>
        <div id="bookmarks"></div>
      </div>

      <div class="spacer"></div>

      <div id="apps" hidden>
        <div class="apps-title">Aïobi World</div>
        <button class="app" data-key="docs">
          <svg viewBox="0 0 24 24" class="ic"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" /><path d="M8 13h8" /><path d="M8 17h8" /></svg>
          <span>Docs</span>
        </button>
        <button class="app" data-key="sheets">
          <svg viewBox="0 0 24 24" class="ic"><rect x="3" y="3" width="18" height="18" rx="2" /><path d="M3 9h18" /><path d="M3 15h18" /><path d="M12 3v18" /></svg>
          <span>Sheets</span>
        </button>
        <button class="app" data-key="drive">
          <svg viewBox="0 0 24 24" class="ic"><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" /><path d="M2 12h20" /><path d="M6 16h.01" /><path d="M10 16h.01" /></svg>
          <span>Drive</span>
        </button>
        <button class="app" data-key="forms">
          <svg viewBox="0 0 24 24" class="ic"><rect x="8" y="2" width="8" height="4" rx="1" /><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" /><path d="M9 12h6" /><path d="M9 16h6" /></svg>
          <span>Forms</span>
        </button>
        <button class="app" data-key="mail">
          <svg viewBox="0 0 24 24" class="ic"><rect x="2" y="4" width="20" height="16" rx="2" /><path d="m2 7 10 6 10-6" /></svg>
          <span>Mail</span>
        </button>
        <button class="app" data-key="meet">
          <svg viewBox="0 0 24 24" class="ic"><path d="m23 7-7 5 7 5z" /><rect x="1" y="5" width="15" height="14" rx="2" /></svg>
          <span>Meet</span>
        </button>
        <button class="app" data-key="calendar">
          <svg viewBox="0 0 24 24" class="ic"><rect x="3" y="4" width="18" height="18" rx="2" /><path d="M3 10h18" /><path d="M8 2v4" /><path d="M16 2v4" /></svg>
          <span>Calendar</span>
        </button>
      </div>

      <footer id="dock">
        <button id="appsbtn" class="iconbtn" title="Aïobi World">
          <svg viewBox="0 0 24 24" class="ic"><rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" /></svg>
        </button>
        <button id="settings" class="iconbtn" data-i18n-title="settings" title="Réglages">
          <svg viewBox="0 0 24 24" class="ic">
            <path d="M20 7h-9" /><path d="M14 17H5" /><circle cx="17" cy="17" r="3" /><circle cx="7" cy="7" r="3" />
          </svg>
        </button>
        <button id="history" class="iconbtn" data-i18n-title="history" title="Historique">
          <svg viewBox="0 0 24 24" class="ic">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /><path d="M12 7v5l4 2" />
          </svg>
        </button>
        <button id="favorites" class="iconbtn" data-i18n-title="favorites" title="Favoris">
          <svg viewBox="0 0 24 24" class="ic">
            <path d="M11.5 2.3a.53.53 0 0 1 .95 0l2.31 4.68a2.12 2.12 0 0 0 1.6 1.16l5.16.76a.53.53 0 0 1 .3.9l-3.74 3.64a2.12 2.12 0 0 0-.61 1.88l.88 5.14a.53.53 0 0 1-.77.56l-4.62-2.43a2.12 2.12 0 0 0-1.97 0L6.4 21a.53.53 0 0 1-.77-.56l.88-5.14a2.12 2.12 0 0 0-.61-1.88L2.16 9.8a.53.53 0 0 1 .3-.9l5.16-.76a2.12 2.12 0 0 0 1.6-1.16z" />
          </svg>
        </button>
        <button id="downloads" class="iconbtn" data-i18n-title="downloads" title="Téléchargements">
          <svg viewBox="0 0 24 24" class="ic">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><path d="m7 10 5 5 5-5" /><path d="M12 15V3" />
          </svg>
        </button>
        <div class="dock-sep"></div>
        <button id="chat" class="rowbtn chatbtn" title="Aïobi Chat">
          <svg viewBox="0 0 24 24" class="ic"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" /></svg>
          <span data-i18n="chat">Chat</span>
        </button>
      </footer>
    </div>
    <template id="tpl-close"><svg viewBox="0 0 24 24" class="ic"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg></template>
    <template id="tpl-search"><svg viewBox="0 0 24 24" class="ic"><circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" /></svg></template>
    <script src="chrome.js"></script>
  </body>
</html>
