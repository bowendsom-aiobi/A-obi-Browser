name: Build (unsigned)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      APPIMAGE_EXTRACT_AND_RUN: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Linux build deps (AppImage needs libfuse2)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2t64

      - run: npm ci

      - run: npm run --silent smoke

      - name: Build (unsigned)
        run: npx --no-install electron-builder --publish never

      - uses: actions/upload-artifact@v6
        with:
          name: aiobi-browser-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
          if-no-files-found: ignore
          retention-days: 14
