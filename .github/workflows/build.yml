name: Build (unsigned)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      APPIMAGE_EXTRACT_AND_RUN: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Linux build deps (AppImage needs libfuse2)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2t64

      - name: Apple signing + notarization setup (macOS only)
        if: runner.os == 'macOS'
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          printf '%s' "$MAC_CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          printf '%s' "$APPLE_API_KEY_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          {
            echo "CSC_LINK=$RUNNER_TEMP/cert.p12"
            echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
            echo "CSC_IDENTITY_AUTO_DISCOVERY=true"
            echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
          } >> "$GITHUB_ENV"

      - name: Disable signing on non-macOS
        if: runner.os != 'macOS'
        run: echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

      - run: npm ci

      - run: npm run --silent smoke

      - name: Build
        run: npx --no-install electron-builder --publish never

      - uses: actions/upload-artifact@v6
        with:
          name: aiobi-browser-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
          if-no-files-found: ignore
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release (public download assets)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/Aiobi-Browser-mac-*.dmg
            artifacts/Aiobi-Browser-windows-*.exe
            artifacts/Aiobi-Browser-linux-*.AppImage
            artifacts/Aiobi-Browser-linux-*.deb
